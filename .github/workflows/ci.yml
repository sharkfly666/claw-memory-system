name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Run autonomous memory smoke
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python scripts/run_autonomous_memory_smoke.py

      - name: Run lifecycle queue smoke
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python scripts/run_lifecycle_queue_smoke.py
